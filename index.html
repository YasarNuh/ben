<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaşar Nuh Donma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#000;
color:#fff;
overflow:hidden;
position:relative;
}

/* GEOMETRİK ANİMASYONLU ARKA PLAN */
body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%,rgba(255,0,0,.08),transparent 25%),
radial-gradient(circle at 80% 70%,rgba(255,255,255,.04),transparent 30%),
radial-gradient(circle at 50% 50%,rgba(255,0,0,.05),transparent 40%);
pointer-events:none;
}

/* hareketli kırmızı çizgiler */
body::after{
content:'';
position:fixed;
inset:-50%;
background:
repeating-linear-gradient(115deg,
transparent 0 120px,
rgba(255,0,0,.18) 120px 122px,
transparent 122px 240px
);
filter:blur(2px);
animation:moveLines 4s linear infinite;
pointer-events:none;
opacity:.9;
}

@keyframes moveLines{
from{transform:translate3d(-200px,-100px,0) rotate(0deg);}
to{transform:translate3d(200px,100px,0) rotate(1deg);}
}

/* KART */
.card{
position:relative;
z-index:2;
width:92%;
max-width:520px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
padding:32px;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.name{
font-size:28px;
font-weight:800;
text-align:center;
letter-spacing:1px;
transition:.35s ease;
cursor:pointer;
margin-bottom:24px;
}

.name:hover,.name:active{
color:#ff2b2b;
text-shadow:0 0 10px #ff0000,0 0 20px #ff0000,0 0 40px #111,0 0 60px #ff0000;
transform:scale(1.03);
}

.links{
display:grid;
gap:14px;
}

.btn{
display:block;
text-decoration:none;
color:#fff;
text-align:center;
padding:16px;
border-radius:16px;
background:linear-gradient(135deg,#1b1b1b,#2a2a2a);
border:1px solid rgba(255,255,255,.08);
transition:.25s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(255,0,0,.25);
border-color:#ff2b2b;
}
</style>
</head>
<body>

<div class="card">
<div class="name">Yaşar Nuh Donma</div>
<div class="links">
<a class="btn" href="https://open.spotify.com/user/31m754rveers3rxlu5sh7qsgcmzu">Spotify</a>
<a class="btn" href="https://x.com/donma_nuh20630">X / Twitter</a>
<a class="btn" href="https://music.youtube.com/@yasarnuh7571">YouTube Music</a>
</div>
</div>

</body>
</html>
